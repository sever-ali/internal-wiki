- name: Deploy Flask + Nginx via Docker Compose
  hosts: web
  become: yes

  vars:
    app_dir: /opt/flask_wiki

  tasks:
    - name: Install Docker
      apt:
        name: docker.io
        update_cache: yes
        state: present

    - name: Install Docker Compose (standalone plugin)
      get_url:
        url: https://github.com/docker/compose/releases/download/v2.24.6/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Ensure Docker is started
      service:
        name: docker
        state: started
        enabled: yes

    - name: Create deployment folder
      file:
        path: "{{ app_dir }}"
        state: directory

    - name: Copy full Flask Compose app to EC2
      copy:
        src: flask_app/
        dest: "{{ app_dir }}/"
        mode: '0755'
    
    - name: Show all running containers before removing
      shell: docker ps -a

    - name: Stop and remove any container with name matching flask_app
      shell: |
        docker ps -a --filter "name=flask_app" --format "{{.ID}}" | xargs -r docker rm -f
      ignore_errors: yes
      
    - name: Stop and remove any container named flask_app if it exists
      shell: |
        docker ps -a --filter "name=flask_app" --format "{{.ID}}" | xargs -r docker rm -f
      ignore_errors: yes

    - name: Run Docker Compose up
      command: docker-compose up -d
      args:
        chdir: "{{ app_dir }}"


